services:
  web:
    build: .
    container_name: ai-work-diary-web
    ports:
      - "80:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./files_info.json:/app/files_info.json
      - ./config.json:/app/config.json
    environment:
      - FLASK_ENV=production
    restart: unless-stopped